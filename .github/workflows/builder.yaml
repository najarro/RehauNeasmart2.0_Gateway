name: Builder

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/builder.yaml"
      - "rehau_neasmart2.0_gateway/build.yaml"
      - "rehau_neasmart2.0_gateway/config.yaml"
      - "rehau_neasmart2.0_gateway/Dockerfile"
      - "rehau_neasmart2.0_gateway/rootfs/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/builder.yaml"
      - "rehau_neasmart2.0_gateway/build.yaml"
      - "rehau_neasmart2.0_gateway/config.yaml"
      - "rehau_neasmart2.0_gateway/Dockerfile"
      - "rehau_neasmart2.0_gateway/rootfs/**"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build ${{ matrix.arch }} add-on
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - aarch64
          - amd64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Get add-on information
        id: info
        uses: home-assistant/actions/helpers/info@master
        with:
          path: ./rehau_neasmart2.0_gateway

      - name: Prepare build settings
        id: settings
        env:
          EVENT_NAME: ${{ github.event_name }}
          IMAGE_JSON: ${{ steps.info.outputs.image }}
        run: |
          image_uri=$(jq --raw-output '.' <<< "${IMAGE_JSON}")
          echo "image=${image_uri##*/}" >> "${GITHUB_OUTPUT}"
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            echo "build_args=--test" >> "${GITHUB_OUTPUT}"
          else
            echo "build_args=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build add-on
        uses: home-assistant/builder@2026.03.2
        with:
          args: |
            ${{ steps.settings.outputs.build_args }} \
            --${{ matrix.arch }} \
            --target /data/rehau_neasmart2.0_gateway \
            --image "${{ steps.settings.outputs.image }}" \
            --docker-hub "ghcr.io/${{ github.repository_owner }}" \
            --addon
